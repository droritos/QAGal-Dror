name: Build, Test, and Deploy Unity Project

on: [push, pull_request]

jobs:
  testRunner:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: QA Unity Project/Library
          key: Library-Tests-${{ hashFiles('QA Unity Project/Assets/**', 'QA Unity Project/Packages/**', 'QA Unity Project/ProjectSettings/**') }}
          restore-keys: |
            Library-Tests-
            Library-
            
      - name: Run Unity Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: "QA Unity Project"
          unityVersion: 6000.0.43f1
          testMode: All
          artifactsPath: artifacts/TestResults

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test-Results
          path: artifacts/TestResults

  buildWebGL:
    name: Build WebGL
    runs-on: ubuntu-latest
    needs: testRunner
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: QA Unity Project/Library
          key: Library-WebGL-${{ hashFiles('QA Unity Project/Assets/**', 'QA Unity Project/Packages/**', 'QA Unity Project/ProjectSettings/**') }}
          restore-keys: |
            Library-WebGL-
            Library-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: "QA Unity Project"
          unityVersion: 6000.0.43f1
          targetPlatform: WebGL

      - name: Upload WebGL Build
        uses: actions/upload-artifact@v4
        with:
          name: Build-WebGL
          path: build/WebGL

  buildAndroid:
    name: Build Android
    runs-on: ubuntu-latest
    needs: testRunner
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Library
        uses: actions/cache@v3
        with:
          path: QA Unity Project/Library
          key: Library-Android-${{ hashFiles('QA Unity Project/Assets/**', 'QA Unity Project/Packages/**', 'QA Unity Project/ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Build Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: "QA Unity Project"
          unityVersion: 6000.0.43f1
          targetPlatform: Android

      - name: Upload Android Build
        uses: actions/upload-artifact@v4
        with:
          name: Build-Android
          path: build/Android
